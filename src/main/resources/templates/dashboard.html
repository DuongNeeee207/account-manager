<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Space Grotesk',sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#ffde59;
padding:20px;
}

.card{
width:500px;
background:white;
border:4px solid black;
border-radius:24px;
padding:35px;
box-shadow:12px 12px 0 black;
}

.profile{
display:flex;
align-items:center;
gap:20px;
margin-bottom:25px;
}

.avatar{
width:90px;
height:90px;
border-radius:50%;
border:4px solid black;
background:#cb6ce6;
display:flex;
justify-content:center;
align-items:center;
font-size:36px;
font-weight:700;
box-shadow:5px 5px 0 black;
}

.name{
font-size:28px;
font-weight:700;
}

.role{
display:inline-block;
margin-top:8px;
padding:6px 14px;
background:#a7f3d0;
border:3px solid black;
border-radius:999px;
font-weight:700;
}

.info-card{
margin-top:20px;
}

.info{
background:#f5f5f5;
border:3px solid black;
border-radius:14px;
padding:15px;
margin-bottom:15px;
box-shadow:4px 4px 0 black;
}

.label{
font-size:14px;
font-weight:700;
opacity:.7;
}

.value{
font-size:18px;
font-weight:700;
margin-top:4px;
}

.logout{
display:block;
width:100%;
padding:15px;
margin-top:20px;
text-align:center;
text-decoration:none;
color:black;
background:#ff7b7b;
border:3px solid black;
border-radius:12px;
font-weight:700;
font-size:18px;
box-shadow:6px 6px 0 black;
transition:.2s;
}

.logout:hover{
background:#ff9d9d;
}

.logout:active{
transform:translate(4px,4px);
box-shadow:2px 2px 0 black;
}

.edit-btn{
display:block;
width:100%;
padding:15px;
margin-top:20px;
text-align:center;
text-decoration:none;
color:black;
background:#38bdf8;
border:3px solid black;
border-radius:12px;
font-weight:700;
font-size:18px;
box-shadow:6px 6px 0 black;
transition:.2s;
}

.edit-btn:hover{
background:#67d0ff;
}

.edit-btn:active{
transform:translate(4px,4px);
box-shadow:2px 2px 0 black;
}
.avatar-img{
width:90px;
height:90px;
border-radius:50%;
border:4px solid black;
object-fit:cover;
box-shadow:5px 5px 0 black;
}
</style>

</head>

<body>

<div class="card">

<div class="profile">

<img
th:if="${user.avatarUrl != null}"
th:src="${user.avatarUrl}"
class="avatar-img">

<div
th:if="${user.avatarUrl == null}"
class="avatar"
th:text="${#strings.substring(user.username,0,1).toUpperCase()}">
D
</div>

<div>

<div class="name"
th:text="${user.username}">
Duong
</div>

<div class="role"
th:text="${user.role}">
USER
</div>

</div>

</div>

<div class="info-card">

<div class="info">

<div class="label">
📧 EMAIL
</div>

<div class="value"
th:text="${user.email}">
email@gmail.com
</div>

</div>

<div class="info">

<div class="label">
🆔 USER ID
</div>

<div class="value"
th:text="${user.id}">
1
</div>

</div>

<div class="info">

<div class="label">
🔐 ROLE
</div>

<div class="value"
th:text="${user.role}">
USER
</div>

</div>

</div>

<a href="/profile" class="edit-btn">
✏️ CHỈNH SỬA HỒ SƠ
</a>
<a
th:if="${user.role == 'ADMIN'}"
href="/admin"
class="edit-btn">

👑 ADMIN PANEL

</a>

<a href="/logout" class="logout">
ĐĂNG XUẤT
</a>

</div>

<script>

gsap.from(".card",{
y:80,
opacity:0,
duration:1,
ease:"back.out(1.7)"
});

gsap.from(".info",{
y:20,
opacity:0,
duration:.6,
stagger:.15
});

</script>

</body>
</html>
