<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">

<title>Profile</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Space Grotesk',sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#38bdf8;
padding:20px;
}

.card{
width:550px;
background:white;
padding:40px;
border:4px solid black;
border-radius:20px;
box-shadow:12px 12px 0 black;
}

.badge{
display:inline-block;
padding:10px 18px;
background:#fef08a;
border:3px solid black;
border-radius:999px;
font-weight:700;
margin-bottom:20px;
box-shadow:4px 4px 0 black;
}

h1{
font-size:40px;
margin-bottom:25px;
}

.avatar-preview{
width:140px;
height:140px;
border-radius:50%;
border:4px solid black;
object-fit:cover;
display:block;
margin:auto;
margin-bottom:20px;
box-shadow:5px 5px 0 black;
}

input{
width:100%;
padding:15px;
border:3px solid black;
border-radius:10px;
font-size:18px;
box-shadow:4px 4px 0 black;
margin-bottom:20px;
}

label{
display:block;
font-weight:700;
margin-bottom:8px;
}

.save-btn{
width:100%;
padding:15px;
border:none;
cursor:pointer;
background:#22c55e;
border:3px solid black;
border-radius:10px;
font-size:18px;
font-weight:700;
box-shadow:6px 6px 0 black;
transition:.2s;
}

.save-btn:hover{
transform:translateY(-2px);
}

.save-btn:disabled{
opacity:.6;
cursor:not-allowed;
}

.back-btn{
display:block;
margin-top:15px;
padding:15px;
text-align:center;
text-decoration:none;
background:#cb6ce6;
color:black;
font-weight:700;
border:3px solid black;
border-radius:10px;
box-shadow:6px 6px 0 black;
}

.progress-box{
display:none;
margin-bottom:20px;
}

.progress{
height:20px;
border:3px solid black;
border-radius:999px;
overflow:hidden;
background:#e5e7eb;
}

.progress-bar{
height:100%;
width:0%;
background:#22c55e;
transition:.3s;
}

.progress-text{
margin-top:8px;
font-weight:700;
text-align:center;
}

</style>

</head>

<body>

<div class="card">

<div class="badge">
👤 CHỈNH SỬA HỒ SƠ
</div>

<h1>Profile</h1>

<form id="profileForm"
      method="post"
      enctype="multipart/form-data">

<img
id="preview"
class="avatar-preview"
th:src="${user.avatarUrl}"
src="https://via.placeholder.com/140">

<input
name="username"
th:value="${user.username}"
placeholder="Tên người dùng"
required>

<label>📷 Chọn ảnh đại diện</label>

<input
id="avatarInput"
type="file"
name="avatar"
accept="image/*">

<div class="progress-box" id="progressBox">

<div class="progress">
<div class="progress-bar" id="progressBar"></div>
</div>

<div class="progress-text" id="progressText">
0%
</div>

</div>

<input
type="password"
name="newPassword"
placeholder="Mật khẩu mới">

<button
id="saveBtn"
type="submit"
class="save-btn">

💾 LƯU THAY ĐỔI

</button>

</form>

<a href="/dashboard" class="back-btn">
⬅ QUAY LẠI DASHBOARD
</a>

</div>

<script>

const avatarInput =
document.getElementById("avatarInput");

const preview =
document.getElementById("preview");

avatarInput.addEventListener("change", e => {

const file = e.target.files[0];

if(!file) return;

const reader = new FileReader();

reader.onload = function(event){

gsap.to(preview,{
scale:0.8,
opacity:0,
duration:0.25,
onComplete:()=>{

preview.src = event.target.result;

gsap.fromTo(
preview,
{
scale:1.3,
opacity:0,
rotate:15
},
{
scale:1,
opacity:1,
rotate:0,
duration:0.5,
ease:"back.out(1.7)"
}
);

}
});

}

reader.readAsDataURL(file);

});

document
.getElementById("profileForm")
.addEventListener("submit",function(){

document
.getElementById("progressBox")
.style.display="block";

document
.getElementById("saveBtn")
.disabled=true;

let progress=0;

const interval=setInterval(()=>{

progress+=5;

document
.getElementById("progressBar")
.style.width=progress+"%";

document
.getElementById("progressText")
.innerText=progress+"%";

if(progress>=95){
clearInterval(interval);
}

},100);

});

gsap.from(".card",{
y:80,
opacity:0,
duration:0.8,
ease:"back.out(1.7)"
});

gsap.from(".avatar-preview",{
scale:0,
duration:0.8,
delay:0.2,
ease:"back.out(1.7)"
});

</script>

</body>
</html>
