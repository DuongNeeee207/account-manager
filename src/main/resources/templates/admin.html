<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">

<title>Admin Panel</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Space Grotesk',sans-serif;
}

body{
background:#0f172a;
padding:30px;
min-height:100vh;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.title{
font-size:40px;
font-weight:700;
color:white;
}

.total{
color:white;
font-size:20px;
margin-top:10px;
}

.back-btn{
text-decoration:none;
background:#38bdf8;
color:black;
padding:12px 20px;
font-weight:700;
border-radius:12px;
border:3px solid black;
box-shadow:5px 5px 0 black;
}

.user-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(350px,1fr));
gap:20px;
}

.card{
background:white;
padding:20px;
border-radius:20px;
border:4px solid black;
box-shadow:8px 8px 0 black;
display:flex;
gap:20px;
align-items:center;
}

.avatar{
width:90px;
height:90px;
border-radius:50%;
object-fit:cover;
border:4px solid black;
}

.info h2{
font-size:24px;
margin-bottom:5px;
}

.email{
opacity:.7;
margin-bottom:10px;
}

.id{
font-weight:700;
margin-bottom:10px;
}

.role{
display:inline-block;
padding:6px 14px;
border-radius:999px;
font-weight:700;
border:3px solid black;
}

.role-user{
background:#a7f3d0;
}

.role-admin{
background:#fca5a5;
}

</style>

</head>

<body>

<div class="header">

<div>

<div class="title">
👑 ADMIN PANEL
</div>

<div class="total">
Tổng user:
<b th:text="${#lists.size(users)}">0</b>
</div>

</div>

<a href="/dashboard" class="back-btn">
⬅ Dashboard
</a>

</div>

<div class="user-grid">

<div
th:each="user : ${users}"
class="card">

<img
th:if="${user.avatarUrl != null and !user.avatarUrl.isEmpty()}"
th:src="${user.avatarUrl}"
class="avatar">

<img
th:if="${user.avatarUrl == null or user.avatarUrl.isEmpty()}"
src="https://cdn-icons-png.flaticon.com/512/149/149071.png"
class="avatar">

<div class="info">

<h2 th:text="${user.username}">
Username
</h2>

<div class="email"
th:text="${user.email}">
email@gmail.com
</div>

<div class="id">
ID:
<span th:text="${user.id}">
1
</span>
</div>

<div
th:class="${user.role == 'ADMIN'}
? 'role role-admin'
: 'role role-user'"

th:text="${user.role}">
USER
</div>

</div>

</div>

</div>

<script>

gsap.from(".card",{
opacity:0,
y:40,
duration:0.7,
stagger:0.1
});

</script>

</body>

</html>
